eco:parseFloat(pa.preco),qtd:q,img:pa.img,tamanho:tam});localStorage.setItem('carrinhoFaux',JSON.stringify(c));showConfirm(q+'x '+pa.nome+' (Tam '+tam+') adicionado! Ir para o carrinho?',()=>{location.href='carrinho.html';if(red)location.href='checkout.html';});}function uN(){let e=localStorage.getItem('userEmailFaux'),r=localStorage.getItem('userRoleFaux'),lb=document.getElementById('lg'),pb=document.getElementById('pf');if(e){lb.style.display='none';pb.style.display='inline-block';pb.onclick=()=>location.href=r==='admin'?'admin.html':'perfil.html';}else{lb.style.display='inline-block';lb.onclick=()=>document.getElementById('md').style.display='flex';pb.style.display='none';}}init();uN();document.getElementById('cB').onclick=()=>adc(true);document.getElementById('aB').onclick=()=>adc(false);let md=document.getElementById('md'),cs=md.querySelector('.cl'),tbs=md.querySelectorAll('.tb button'),pL=document.getElementById('pL'),pR=document.getElementById('pR');tbs.forEach(b=>b.onclick=()=>{tbs.forEach(x=>x.classList.remove('on'));b.classList.add('on');pL.classList.remove('on');pR.classList.remove('on');(b.dataset.t==='l'?pL:pR).classList.add('on');});cs.onclick=()=>md.style.display='none';md.onclick=e=>{if(e.target===md)md.style.display='none';};function su(em,ro){localStorage.setItem('userEmailFaux',em);localStorage.setItem('userRoleFaux',ro);md.style.display='none';uN();showAlert(ro==='admin'?'Login como administrador realizado com sucesso!':'Login realizado com sucesso!');}document.getElementById('mL').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;if(em&&s){let u=JSON.parse(localStorage.getItem('usersFaux')||'[]').find(u=>u.email===em&&u.senha===s);u?su(em,'user'):showAlert('Email/senha inválidos!');}else showAlert('Preencha todos os campos!');};document.getElementById('mA').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;em==='admin@faux.com'&&s==='123456'?su(
