der-top:2px solid #000}.rt .ln{display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.85rem}.rt .fb{font-weight:800;font-size:1.1rem;margin-top:8px;padding-top:8px;border-top:2px solid #000}.bf{background:#000;color:#fff;border:2px solid #000;padding:12px;width:100%;font-weight:800;font-size:0.9rem;cursor:pointer;margin-top:16px}.frt{background:#f0f0f0;color:#000;padding:6px;border:1px solid #000;margin-top:6px;display:none;font-weight:600;font-size:0.8rem}footer{background:#000;color:#ccc;padding:12px;text-align:center;border-top:2px solid #fff;margin-top:auto;font-size:0.8rem}footer a{color:#fff;margin:0 4px;text-decoration:none}.md{z-index:1000;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:none;justify-content:center;align-items:center;padding:12px}.mc{background:#fff;border:2px solid #000;width:100%;max-width:320px;padding:14px}.mc h3{color:#000;margin-bottom:10px;font-size:1.5rem}.mc input{width:100%;padding:8px;margin-bottom:8px;background:#fff;border:2px solid #000;font-size:0.9rem}.mc button{background:#000;color:#fff;border:none;padding:8px;width:100%;margin-top:4px;font-weight:700;cursor:pointer;font-size:0.9rem}.cl{float:right;font-size:1.6rem;color:#000;cursor:pointer}.tb{display:flex;gap:8px;margin-bottom:10px}.tb button{background:none;border:none;padding:6px 10px;font-weight:700;color:#000;font-size:0.9rem;cursor:pointer}.tb button.on{background:#000;color:#fff}.tp{display:none}.tp.on{display:block}@media(min-width:600px){.ck{flex-direction:row;gap:20px}.cf{flex:2}.cr2{flex:1}}.pm{z-index:2000;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:none;justify-content:center;align-items:center;padding:12px}.pmc{background:#fff;border:2px solid #000;width:100%;max-width:300px;padding:14px;text-align:center}.pmc p{margin-bottom:12px;color:#000;font-size:0.9rem}.pmc button{background:#000;color:#fff;border:none;padding:8px 16px;font-weight:700;cursor:pointer;font-size:0.9rem;margin:0 4px}</style></head><body><nav><a href="index.html" class="logo">FAUX GHOST</a><div class="nl"><a href="index.html">Home</a><a href="produtos.html">Roupas</a><a href="carrinho.html">Carrinho</a><a href="#" id="pf" class="bp" style="display:none">Perfil</a><button id="lg">Entrar</button></div></nav><section class="ck"><div class="cf"><h1 class="tt">Finalizar Pedido</h1><div class="sc"><h2>Endereço de Entrega</h2><div class="fg"><label for="cep">CEP</label><div class="fr"><input type="text" id="cep" placeholder="00000-000" maxlength="9"><button class="bc" id="bCep">Buscar CEP</button></div><div class="frt" id="frtI"></div></div><div class="fr"><div class="fg"><label for="end">Endereço</label><input id="end" placeholder="Rua, Av..."></div><div class="fg"><label for="num">Número</label><input id="num" placeholder="Número"></div></div><div class="fr"><div class="fg"><label for="bai">Bairro</label><input id="bai" placeholder="Bairro"></div><div class="fg"><label for="cid">Cidade</label><input id="cid" placeholder="Cidade"></div></div><div class="fr"><div class="fg"><label for="est">UF</label><input id="est" placeholder="UF" maxlength="2" readonly></div><div class="fg"><label for="comp">Complemento</label><input id="comp" placeholder="Opcional"></div></div></div><div class="sc"><h2>Pagamento</h2><div class="po"><label><input type="radio" name="pg" value="credito" checked> Crédito</label><label><input type="radio" name="pg" value="debito"> Débito</label><label><input type="radio" name="pg" value="pix"> PIX</label><label><input type="radio" name="pg" value="boleto"> Boleto</label></div><div id="cI"><div class="fg"><label for="nC">Nome no cartão</label><input id="nC" placeholder="Como está no cartão"></div><div class="fg"><label for="nN">Número</label><input id="nN" placeholder="0000 0000 0000 0000"></div><div class="fr"><div class="fg"><label for="vl">Validade</label><input id="vl" placeholder="MM/AA"></div><div class="fg"><label for="cv">CVV</label><input id="cv" placeholder="123" maxlength="4"></div></div></div><div id="pI" style="display:none"><p>Chave PIX: pagamento@fauxghost.com</p></div><div id="bI" style="display:none"><p>Boleto gerado após confirmação.</p></div></div><button class="bf" id="fB">Confirmar Pedido</button></div><div class="cr2"><div class="rp"><h2>Resumo</h2><div id="rI"></div><div class="rt" id="rT"></div></div></div></section><footer><p>FAUX GHOST © 2025</p><p><a href="contato.html">Sobre</a> | <a href="contato.html">Entregas</a> | <a href="contato.html">Trocas</a> | <a href="contato.html">Contato</a></p></footer><div id="md" class="md"><div class="mc"><span class="cl">&times;</span><h3>Acessar</h3><div class="tb"><button class="on" data-t="l">Login</button><button data-t="r">Registro</button></div><div id="pL" class="tp on"><input id="lE" placeholder="Email"><input id="lS" type="password" placeholder="Senha"><button id="mL">Entrar</button><button id="mA" style="background:#fff;color:#000;border:2px solid #000">Admin</button><a href="#" id="fe" style="display:block;text-align:center;margin-top:6px;color:#000;font-size:0.8rem">Esqueceu a senha?</a></div><div id="pR" class="tp"><input id="rN" placeholder="Nome"><input id="rE" placeholder="Email"><input id="rS" type="password" placeholder="Senha"><input id="rC" type="password" placeholder="Confirmar"><button id="mR">Criar Conta</button></div><div style="margin-top:8px;text-align:center;font-size:0.75rem;color:#000">admin@faux.com / 123456</div></div></div><div id="fM" class="pm"><div class="pmc"><p id="fMp"></p><input id="fMi" placeholder="Digite seu e-mail" style="width:100%;padding:8px;margin-bottom:8px;border:2px solid #000;font-size:0.9rem;display:none"><button id="fMb"></button><button id="fMc" style="background:#fff;color:#000;border:2px solid #000">Fechar</button></div></div><div id="am" class="pm"><div class="pmc"><p id="amp"></p><div id="amin" style="display:none"><input id="ami" placeholder="" style="width:100%;padding:8px;margin-bottom:8px;border:2px solid #000;font-size:0.9rem"></div><button id="amb">OK</button><button id="amc" style="background:#fff;color:#000;border:2px solid #000;display:none">Cancelar</button></div></div><script>(function(){let FT=0;const SU={SP:1,RJ:1,MG:1,ES:1},SL={PR:2,SC:2,RS:2},CO={GO:3,DF:3,MT:3,MS:3},NE={BA:4,SE:4,AL:4,PE:4,PB:4,RN:4,CE:4,PI:4,MA:4},NO={AC:5,AM:5,AP:5,PA:5,RO:5,RR:5,TO:5},FV={1:15,2:22,3:32,4:45,5:58},FN={1:'Sudeste',2:'Sul',3:'Centro-Oeste',4:'Nordeste',5:'Norte'};const calcF=uf=>{let u=uf.toUpperCase().trim(),r=SU[u]||SL[u]||CO[u]||NE[u]||NO[u]||0;FT=r?FV[r]:58;let fi=document.getElementById('frtI');if(r){fi.style.display='block';fi.textContent='Frete: R$ '+FT.toFixed(2)+' ('+FN[r]+')';}else{fi.style.display='block';fi.textContent='Região não identificada. Frete: R$ '+FT.toFixed(2);}rR();};const rR=()=>{let c=JSON.parse(localStorage.getItem('carrinhoFaux')||'[]'),rI=document.getElementById('rI'),rT=document.getElementById('rT');if(!c.length){rI.innerHTML='<p>Carrinho vazio</p>';rT.innerHTML='<div class="ln fb"><span>Total:</span><span>R$ 0,00</span></div>';return;}rI.innerHTML=c.map(i=>`<div class="ri"><span>${i.qtd}x ${i.nome.replace(/'/g,"\\'")}</span><span>R$ ${(i.preco*i.qtd).toFixed(2)}</span></div>`).join('');let st=c.reduce((s,i)=>s+i.preco*i.qtd,0),tl=st+FT;rT.innerHTML=`<div class="ln"><span>Subtotal:</span><span>R$ ${st.toFixed(2)}</span></div><div class="ln"><span>Frete:</span><span>R$ ${FT.toFixed(2)}</span></div><div class="ln fb"><span>Total:</span><span>R$ ${tl.toFixed(2)}</span></div>`;};document.querySelectorAll('input[name="pg"]').forEach(r=>r.onclick=()=>{document.getElementById('cI').style.display=(r.value==='credito'||r.value==='debito')?'block':'none';document.getElementById('pI').style.display=r.value==='pix'?'block':'none';document.getElementById('bI').style.display=r.value==='boleto'?'block':'none';});document.getElementById('bCep').onclick=async()=>{let cp=document.getElementById('cep').value.replace(/\D/g,'');if(cp.length!==8){showAlert('CEP inválido');return;}try{let r=await fetch('https://viacep.com.br/ws/'+cp+'/json/'),d=await r.json();if(d.erro){showAlert('CEP não encontrado');return;}document.getElementById('end').value=d.logradouro||'';document.getElementById('bai').value=d.bairro||'';document.getElementById('cid').value=d.localidade||'';document.getElementById('est').value=d.uf||'';calcF(d.uf);}catch(e){showAlert('Erro ao buscar CEP');}};document.getElementById('fB').onclick=()=>{let c=JSON.parse(localStorage.getItem('carrinhoFaux')||'[]');if(!c.length){showAlert('Carrinho vazio');return;}if(!localStorage.getItem('userEmailFaux')){showAlert('Faça login');document.getElementById('md').style.display='flex';return;}let cep=document.getElementById('cep').value,end=document.getElementById('end').value,num=document.getElementById('num').value,bai=document.getElementById('bai').value,cid=document.getElementById('cid').value,est=document.getElementById('est').value;if(!cep||!end||!num||!bai||!cid||!est){showAlert('Preencha o endereço completo');return;}let pg=document.querySelector('input[name="pg"]:checked').value;if((pg==='credito'||pg==='debito')&&(!document.getElementById('nC').value||!document.getElementById('nN').value||!document.getElementById('vl').value||!document.getElementById('cv').value)){showAlert('Preencha os dados do cartão');return;}let st=c.reduce((s,i)=>s+i.preco*i.qtd,0),tl=st+FT,em=localStorage.getItem('userEmailFaux'),ps=JSON.parse(localStorage.getItem('pedidosFaux')||'[]');ps.push({userEmail:em,itens:c,total:tl,status:'Em preparação',data:new Date().toISOString(),endereco:end+', '+num+' - '+bai+', '+cid+'/'+est,frete:FT,pagamento:pg});localStorage.setItem('pedidosFaux',JSON.stringify(ps));let P=JSON.parse(localStorage.getItem('produtosEstoqueFaux')||'{}');c.forEach(i=>{let n=i.nome.split(' (')[0];if(P[n])P[n].total=Math.max(0,P[n].total-i.qtd);});localStorage.setItem('produtosEstoqueFaux',JSON.stringify(P));localStorage.removeItem('carrinhoFaux');showAlert('Pedido confirmado! Obrigado pela compra.',()=>{location.href='index.html';});};function uN(){let e=localStorage.getItem('userEmailFaux'),r=localStorage.getItem('userRoleFaux'),lb=document.getElementById('lg'),pb=document.getElementById('pf');if(e){lb.style.display='none';pb.style.display='inline-block';pb.onclick=()=>location.href=r==='admin'?'admin.html':'perfil.html';}else{lb.style.display='inline-block';lb.onclick=()=>document.getElementById('md').style.display='flex';pb.style.display='none';}}rR();uN();let md=document.getElementById('md'),cs=md.querySelector('.cl'),tbs=md.querySelectorAll('.tb button'),pL=document.getElementById('pL'),pR=document.getElementById('pR');tbs.forEach(b=>b.onclick=()=>{tbs.forEach(x=>x.classList.remove('on'));b.classList.add('on');pL.classList.remove('on');pR.classList.remove('on');(b.dataset.t==='l'?pL:pR).classList.add('on');});cs.onclick=()=>md.style.display='none';md.onclick=e=>{if(e.target===md)md.style.display='none';};function su(em,ro){localStorage.setItem('userEmailFaux',em);localStorage.setItem('userRoleFaux',ro);md.style.display='none';uN();showAlert(ro==='admin'?'Login como administrador realizado com sucesso!':'Login realizado com sucesso!');}document.getElementById('mL').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;if(em&&s){let u=JSON.parse(localStorage.getItem('usersFaux')||'[]').find(u=>u.email===em&&u.senha===s);u?su(em,'user'):showAlert('Email/senha inválidos!');}else showAlert('Preencha todos os campos!');};document.getElementById('mA').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;em==='admin@faux.com'&&s==='123456'?su(em,'admin'):showAlert('Admin inválido!');};document.getElementById('mR').onclick=()=>{let n=document.getElementById('rN').value.trim(),em=document.getElementById('rE').value.trim(),s=document.getElementById('rS').value,c=document.getElementById('rC').value;if(!n||!em||!s||!c)return showAlert('Preencha todos os campos!');if(s!==c)return showAlert('Senhas não conferem!');let us=JSON.parse(localStorage.getItem('usersFaux')||'[]');if(us.find(u=>u.email===em))return showAlert('Email já cadastrado!');us.push({nome:n,email:em,senha:s});localStorage.setItem('usersFaux',JSON.stringify(us));tbs[0].click();document.getElementById('lE').value=em;document.getElementById('lS').value=s;showAlert('Conta criada com sucesso!');document.getElementById('mL').click();};document.getElementById('fe').onclick=e=>{e.preventDefault();let fM=document.getElementById('fM'),fMi=document.getElementById('fMi'),fMp=document.getElementById('fMp'),fMb=document.getElementById('fMb');fM.style.display='flex';fMi.style.display='block';fMp.textContent='Digite seu e-mail para recuperar a senha:';fMb.textContent='Recuperar';fMb.onclick=()=>{let em=fMi.value.trim();if(!em)return showAlert('Digite um e-mail!');let us=JSON.parse(localStorage.getItem('usersFaux')||'[]'),u=us.find(u=>u.email===em);if(u){showAlert('Sua senha: '+u.senha);fM.style.display='none';fMi.value='';}else{showAlert('E-mail não encontrado!');}};};let am=document.getElementById('am'),amp=document.getElementById('amp'),amb=document.getElementById('amb'),amc=document.getElementById('amc'),amin=document.getElementById('amin'),ami=document.getElementById('ami');window.showAlert=(msg,cb)=>{am.style.display='flex';amp.textContent=msg;amin.style.display='none';amb.style.display='inline-block';amc.style.display='none';amb.onclick=()=>{am.style.display='none';if(cb)cb();};};window.showConfirm=(msg,cb)=>{am.style.display='flex';amp.textContent=msg;amin.style.display='none';amb.style.display='inline-block';amc.style.display='inline-block';amb.textContent='Sim';amc.textContent='Não';amb.onclick=()=>{am.style.display='none';if(cb)cb();};amc.onclick=()=>{am.style.display='none';};};document.getElementById('fMc').onclick=()=>{document.getElementById('fM').style.display='none';};document.getElementById('fM').onclick=e=>{if(e.target===document.getElementById('fM'))document.getElementById('fM').style.display='none';};am.onclick=e=>{if(e.target===am)am.style.display='none';};})();</script></body></html>
