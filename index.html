000;color:#fff;border:none;padding:8px 16px;font-weight:700;cursor:pointer;font-size:0.9rem;margin:0 4px}</style></head><body><nav><a href="index.html" class="logo">FAUX GHOST</a><div class="nl"><a href="index.html">Home</a><a href="produtos.html">Roupas</a><a href="carrinho.html">Carrinho</a><a href="#" id="pf" class="bp" style="display:none">Perfil</a><button id="lg">Entrar</button></div></nav><section class="hr"><h1>FAUX GHOST</h1><p>Moda urbana · preto no branco</p><a href="produtos.html" class="bpr">Ver Coleção →</a></section><section class="dst"><h2 class="stl">Mais Vendidos</h2><div class="flt" id="flt"></div><div class="grd" id="grd"></div><div style="text-align:center;margin-top:12px"><a href="produtos.html" class="bpr" style="background:#000;color:#fff">Ver Todos →</a></div></section><footer><p>FAUX GHOST © 2025</p><p><a href="contato.html">Sobre</a> | <a href="contato.html">Entregas</a> | <a href="contato.html">Trocas</a> | <a href="contato.html">Contato</a></p></footer><div id="md" class="md"><div class="mc"><span class="cl">&times;</span><h3>Acessar</h3><div class="tb"><button class="on" data-t="l">Login</button><button data-t="r">Registro</button></div><div id="pL" class="tp on"><input id="lE" placeholder="Email"><input id="lS" type="password" placeholder="Senha"><button id="mL">Entrar</button><button id="mA" style="background:#fff;color:#000;border:2px solid #000">Admin</button><a href="#" id="fe" style="display:block;text-align:center;margin-top:6px;color:#000;font-size:0.8rem">Esqueceu a senha?</a></div><div id="pR" class="tp"><input id="rN" placeholder="Nome"><input id="rE" placeholder="Email"><input id="rS" type="password" placeholder="Senha"><input id="rC" type="password" placeholder="Confirmar"><button id="mR">Criar Conta</button></div><div style="margin-top:8px;text-align:center;font-size:0.75rem;color:#000">admin@faux.com / 123456</div></div></div><div id="fM" class="pm"><div class="pmc"><p id="fMp"></p><input id="fMi" placeholder="Digite seu e-mail" style="width:100%;padding:8px;margin-bottom:8px;border:2px solid #000;font-size:0.9rem;display:none"><button id="fMb"></button><button id="fMc" style="background:#fff;color:#000;border:2px solid #000">Fechar</button></div></div><div id="am" class="pm"><div class="pmc"><p id="amp"></p><div id="amin" style="display:none"><input id="ami" placeholder="" style="width:100%;padding:8px;margin-bottom:8px;border:2px solid #000;font-size:0.9rem"></div><button id="amb">OK</button><button id="amc" style="background:#fff;color:#000;border:2px solid #000;display:none">Cancelar</button></div></div><script>(function(){let P={};const originais=["Camiseta Básica","Jaqueta Jeans","Calça Cargo","Moletom Capuz","Regata Canelada","Blazer Slim","Shorts Sarja","Camisa Linho"];const destaqueHome=originais.slice(0,4);function carregarProdutos(){let s=localStorage.getItem('produtosEstoqueFaux');if(s){P=JSON.parse(s);let mudou=false;Object.keys(P).forEach(k=>{if(P[k].destaque===undefined){P[k].destaque=originais.includes(k);mudou=true;}});if(mudou)localStorage.setItem('produtosEstoqueFaux',JSON.stringify(P));}else{P={};originais.forEach(n=>{P[n]={total:60,desc:"",preco:0,tipo:"",img:"",destaque:true};});P["Camiseta Básica"]={total:60,desc:"Algodão penteado · preta",preco:49.9,tipo:"Camisetas",img:"imagens/roupa1.jpg",destaque:true};P["Jaqueta Jeans"]={total:22,desc:"Jeans azul · lavagem clara",preco:179.9,tipo:"Jaquetas",img:"imagens/roupa2.jpg",destaque:true};P["Calça Cargo"]={total:30,desc:"Sargaço · preta",preco:129.9,tipo:"Calças",img:"imagens/roupa3.jpg",destaque:true};P["Moletom Capuz"]={total:25,desc:"Felpo macio · cinza mescla",preco:99.9,tipo:"Moletons",img:"imagens/roupa4.jpg",destaque:true};P["Regata Canelada"]={total:40,desc:"Canelada · branca",preco:39.9,tipo:"Camisetas",img:"imagens/roupa5.jpg",destaque:true};P["Blazer Slim"]={total:12,desc:"Microfibra · preto",preco:249.9,tipo:"Blazers",img:"imagens/roupa6.jpg",destaque:true};P["Shorts Sarja"]={total:35,desc:"Sarja · bege",preco:79.9,tipo:"Shorts",img:"imagens/roupa7.jpg",destaque:true};P["Camisa Linho"]={total:18,desc:"Linho · branca",preco:159.9,tipo:"Camisas",img:"imagens/roupa8.jpg",destaque:true};localStorage.setItem('produtosEstoqueFaux',JSON.stringify(P));}}let filtro='Todos';function rF(){let tipos=['Todos',...new Set(Object.keys(P).filter(k=>destaqueHome.includes(k)).map(k=>P[k].tipo))];let f=document.getElementById('flt');f.innerHTML=tipos.map(t=>`<button class="${t===filtro?'on':''}" data-f="${t}">${t}</button>`).join('');f.querySelectorAll('button').forEach(b=>b.onclick=()=>{filtro=b.dataset.f;rF();rG();});}function rG(){let it=destaqueHome.filter(k=>{if(filtro==='Todos')return true;return P[k].tipo===filtro;}).map(k=>({n:k,...P[k]}));document.getElementById('grd').innerHTML=it.map(p=>`<div class="cd"><img src="${p.img}" alt="${p.n}" loading="lazy"><div class="if"><div class="nm">${p.n}</div><div class="ds">${p.desc}</div><div class="pr">R$ ${p.preco.toFixed(2)}</div><div class="sk">${p.total} unid.</div><div class="ba"><button class="bd" onclick="verDetalhes('${p.n.replace(/'/g,"\\'")}',${p.preco},'${p.img}','${p.desc.replace(/'/g,"\\'")}',${p.total})">Detalhes</button><button onclick="adC('${p.n.replace(/'/g,"\\'")}',${p.preco},'${p.img}')">Comprar</button></div></div></div>`).join('');}window.verDetalhes=function(n,p,i,d,t){localStorage.setItem('produtoDetalheFaux',JSON.stringify({nome:n,preco:p,img:i,desc:d,total:t}));location.href='detalhes.html';};window.adC=function(n,pr,img){let c=JSON.parse(localStorage.getItem('carrinhoFaux')||'[]'),x=c.find(i=>i.nome===n);x?x.qtd++:c.push({nome:n,preco:pr,qtd:1,img});localStorage.setItem('carrinhoFaux',JSON.stringify(c));showConfirm(n+' adicionado ao carrinho. Ir para o carrinho?',()=>{location.href='carrinho.html';});};function uN(){let e=localStorage.getItem('userEmailFaux'),r=localStorage.getItem('userRoleFaux'),lb=document.getElementById('lg'),pb=document.getElementById('pf');if(e){lb.style.display='none';pb.style.display='inline-block';pb.onclick=()=>location.href=r==='admin'?'admin.html':'perfil.html';}else{lb.style.display='inline-block';lb.onclick=()=>document.getElementById('md').style.display='flex';pb.style.display='none';}}carregarProdutos();rF();rG();uN();let md=document.getElementById('md'),cs=md.querySelector('.cl'),tbs=md.querySelectorAll('.tb button'),pL=document.getElementById('pL'),pR=document.getElementById('pR');tbs.forEach(b=>b.onclick=()=>{tbs.forEach(x=>x.classList.remove('on'));b.classList.add('on');pL.classList.remove('on');pR.classList.remove('on');(b.dataset.t==='l'?pL:pR).classList.add('on');});cs.onclick=()=>md.style.display='none';md.onclick=e=>{if(e.target===md)md.style.display='none';};function su(em,ro){localStorage.setItem('userEmailFaux',em);localStorage.setItem('userRoleFaux',ro);md.style.display='none';uN();showAlert(ro==='admin'?'Login como administrador realizado com sucesso!':'Login realizado com sucesso!');}document.getElementById('mL').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;if(em&&s){let u=JSON.parse(localStorage.getItem('usersFaux')||'[]').find(u=>u.email===em&&u.senha===s);u?su(em,'user'):showAlert('Email/senha inválidos!');}else showAlert('Preencha todos os campos!');};document.getElementById('mA').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;em==='admin@faux.com'&&s==='123456'?su(em,'admin'):showAlert('Admin inválido!');};document.getElementById('mR').onclick=()=>{let n=document.getElementById('rN').value.trim(),em=document.getElementById('rE').value.trim(),s=document.getElementById('rS').value,c=document.getElementById('rC').value;if(!n||!em||!s||!c)return showAlert('Preencha todos os campos!');if(s!==c)return showAlert('Senhas não conferem!');let us=JSON.parse(localStorage.getItem('usersFaux')||'[]');if(us.find(u=>u.email===em))return showAlert('Email já cadastrado!');us.push({nome:n,email:em,senha:s});localStorage.setItem('usersFaux',JSON.stringify(us));tbs[0].click();document.getElementById('lE').value=em;document.getElementById('lS').value=s;showAlert('Conta criada com sucesso!');document.getElementById('mL').click();};document.getElementById('fe').onclick=e=>{e.preventDefault();let fM=document.getElementById('fM'),fMi=document.getElementById('fMi'),fMp=document.getElementById('fMp'),fMb=document.getElementById('fMb');fM.style.display='flex';fMi.style.display='block';fMp.textContent='Digite seu e-mail para recuperar a senha:';fMb.textContent='Recuperar';fMb.onclick=()=>{let em=fMi.value.trim();if(!em)return showAlert('Digite um e-mail!');let us=JSON.parse(localStorage.getItem('usersFaux')||'[]'),u=us.find(u=>u.email===em);if(u){showAlert('Sua senha: '+u.senha);fM.style.display='none';fMi.value='';}else{showAlert('E-mail não encontrado!');}};};let am=document.getElementById('am'),amp=document.getElementById('amp'),amb=document.getElementById('amb'),amc=document.getElementById('amc'),amin=document.getElementById('amin'),ami=document.getElementById('ami');window.showAlert=(msg,cb)=>{am.style.display='flex';amp.textContent=msg;amin.style.display='none';amb.style.display='inline-block';amc.style.display='none';amb.onclick=()=>{am.style.display='none';if(cb)cb();};};window.showConfirm=(msg,cb)=>{am.style.display='flex';amp.textContent=msg;amin.style.display='none';amb.style.display='inline-block';amc.style.display='inline-block';amb.textContent='Sim';amc.textContent='Não';amb.onclick=()=>{am.style.display='none';if(cb)cb();};amc.onclick=()=>{am.style.display='none';};};document.getElementById('fMc').onclick=()=>{document.getElementById('fM').style.display='none';};document.getElementById('fM').onclick=e=>{if(e.target===document.getElementById('fM'))document.getElementById('fM').style.display='none';};am.onclick=e=>{if(e.target===am)am.style.display='none';};})();</script></body></html>
