}.pmc .cl{float:right;font-size:1.8rem;line-height:1;margin-top:-6px}#pdm .pmc button{width:100%;margin:6px 0 0;padding:10px;font-size:0.9rem}#pdm .pmc button:last-child{margin-bottom:0}#pdCancelar{background:#fff;color:#000;border:2px solid #000}@media (max-width:480px){.pmc{max-width:92%;padding:12px}.pmc h3{font-size:1.3rem}.pmc input,.pmc button{font-size:0.85rem;padding:8px}.tb button,.ab{font-size:0.75rem}.ad{padding:12px 8px}.tt{font-size:1.3rem}.mc{max-width:280px}}</style></head><body><nav><a href="index.html" class="logo">FAUX GHOST</a><div class="nl"><a href="index.html">Home</a><a href="produtos.html">Roupas</a><a href="carrinho.html">Carrinho</a><a href="#" id="pf" class="bp" style="display:none">Perfil</a><button id="lg">Entrar</button></div></nav><section class="ad"><h1 class="tt">Painel Administrativo <button class="lo" id="lo">Sair</button></h1><div class="tb"><button class="on" data-t="p">Produtos</button><button data-t="u">Usuários</button><button data-t="o">Pedidos</button></div><div id="tP" class="tp on"><div id="lP"></div><button class="ab a" id="aP">+ Adicionar Roupa</button></div><div id="tU" class="tp"><div id="lU"></div></div><div id="tO" class="tp"><div id="lO"></div></div></section><footer><p>FAUX GHOST © 2025</p><p><a href="contato.html">Sobre</a> | <a href="contato.html">Entregas</a> | <a href="contato.html">Trocas</a> | <a href="contato.html">Contato</a></p></footer><div id="md" class="md"><div class="mc"><span class="cl">&times;</span><h3>Acessar</h3><div class="tb2"><button class="on" data-t="l">Login</button><button data-t="r">Registro</button></div><div id="pL" class="tp2 on"><input id="lE" placeholder="Email"><input id="lS" type="password" placeholder="Senha"><button id="mL">Entrar</button><button id="mA" style="background:#fff;color:#000;border:2px solid #000">Admin</button><a href="#" id="fe" style="display:block;text-align:center;margin-top:6px;color:#000;font-size:0.8rem">Esqueceu a senha?</a></div><div id="pR" class="tp2"><input id="rN" placeholder="Nome"><input id="rE" placeholder="Email"><input id="rS" type="password" placeholder="Senha"><input id="rC" type="password" placeholder="Confirmar"><button id="mR">Criar Conta</button></div><div style="margin-top:8px;text-align:center;font-size:0.75rem;color:#000">admin@faux.com / 123456</div></div></div><div id="fM" class="pm"><div class="pmc"><p id="fMp"></p><input id="fMi" placeholder="Digite seu e-mail" style="display:none"><button id="fMb"></button><button id="fMc" style="background:#fff;color:#000;border:2px solid #000">Fechar</button></div></div><div id="am" class="pm"><div class="pmc"><p id="amp"></p><div id="amin" style="display:none"><input id="ami" placeholder=""></div><button id="amb">OK</button><button id="amc" style="background:#fff;color:#000;border:2px solid #000;display:none">Cancelar</button></div></div><div id="pdm" class="pm"><div class="pmc"><span class="cl" id="pdmClose">&times;</span><h3>➕ Novo Produto</h3><input id="pdNome" placeholder="Nome *"><input id="pdPreco" placeholder="Preço (R$) *" type="number" step="0.01"><input id="pdDesc" placeholder="Descrição"><input id="pdImg" placeholder="Imagem (ex: camisa.jpg)" value="roupa1.jpg"><input id="pdEstoque" placeholder="Estoque *" type="number"><input id="pdTipo" placeholder="Tipo (ex: Camisetas)"><button id="pdSalvar">Salvar</button><button id="pdCancelar">Cancelar</button></div></div><script>(function(){if(localStorage.getItem('userRoleFaux')!=='admin')location.href='index.html';let P={};function carregarProdutos(){let s=localStorage.getItem('produtosEstoqueFaux');if(s){P=JSON.parse(s);}else{P={"Camiseta Básica":{total:60,desc:"Algodão penteado · preta",preco:49.9,tipo:"Camisetas",img:"imagens/roupa1.jpg",destaque:true},"Jaqueta Jeans":{total:22,desc:"Jeans azul · lavagem clara",preco:179.9,tipo:"Jaquetas",img:"imagens/roupa2.jpg",destaque:true},"Calça Cargo":{total:30,desc:"Sargaço · preta",preco:129.9,tipo:"Calças",img:"imagens/roupa3.jpg",destaque:true},"Moletom Capuz":{total:25,desc:"Felpo macio · cinza mescla",preco:99.9,tipo:"Moletons",img:"imagens/roupa4.jpg",destaque:true},"Regata Canelada":{total:40,desc:"Canelada · branca",preco:39.9,tipo:"Camisetas",img:"imagens/roupa5.jpg",destaque:true},"Blazer Slim":{total:12,desc:"Microfibra · preto",preco:249.9,tipo:"Blazers",img:"imagens/roupa6.jpg",destaque:true},"Shorts Sarja":{total:35,desc:"Sarja · bege",preco:79.9,tipo:"Shorts",img:"imagens/roupa7.jpg",destaque:true},"Camisa Linho":{total:18,desc:"Linho · branca",preco:159.9,tipo:"Camisas",img:"imagens/roupa8.jpg",destaque:true}};localStorage.setItem('produtosEstoqueFaux',JSON.stringify(P));}}function salvarProdutos(){localStorage.setItem('produtosEstoqueFaux',JSON.stringify(P));}function rP(){let d=document.getElementById('lP'),ks=Object.keys(P);if(!ks.length){d.innerHTML='<div class="vz">Nenhuma roupa cadastrada</div>';return;}d.innerHTML=ks.map(k=>{let kEsc=k.replace(/'/g,"\\'");return`<div class="ai"><div class="hd"><div><strong>${k}</strong><div class="inf">R$ ${P[k].preco.toFixed(2)} | ${P[k].total} unidades</div><div class="inf">${P[k].desc||''}</div></div><div class="acts"><button class="ab" onclick="eP('${kEsc}')">Editar</button><button class="ab r" onclick="rmP('${kEsc}')">Remover</button></div></div></div>`;}).join('');}window.eP=k=>{let p=P[k],np=parseFloat(prompt('Novo preço:',p.preco)),ne=parseInt(prompt('Novo estoque (unidades):',p.total));if(!isNaN(np))P[k].preco=np;if(!isNaN(ne))P[k].total=ne;salvarProdutos();rP();};window.rmP=k=>{showConfirm('Remover '+k+'?',()=>{delete P[k];salvarProdutos();rP();});};const rU=()=>{let d=document.getElementById('lU'),us=JSON.parse(localStorage.getItem('usersFaux')||'[]');if(!us.length){d.innerHTML='<div class="vz">Nenhum usuário</div>';return;}d.innerHTML=us.map((u,i)=>`<div class="ai"><div class="hd"><div><strong>${u.nome}</strong><div class="inf">${u.email}</div></div><button class="ab r" onclick="rmU(${i})">Remover</button></div></div>`).join('');};window.rmU=i=>{let us=JSON.parse(localStorage.getItem('usersFaux')||'[]');showConfirm('Remover '+us[i].email+'?',()=>{us.splice(i,1);localStorage.setItem('usersFaux',JSON.stringify(us));rU();});};const rO=()=>{let d=document.getElementById('lO'),ps=JSON.parse(localStorage.getItem('pedidosFaux')||'[]');if(!ps.length){d.innerHTML='<div class="vz">Nenhum pedido</div>';return;}d.innerHTML=ps.map((p,i)=>`<div class="oi"><strong>Pedido #${i+1}</strong><p>Cliente: ${p.userEmail}</p><p>Total: R$ ${p.total.toFixed(2)}${p.frete?' + frete R$ '+p.frete.toFixed(2):''}</p><p>Data: ${new Date(p.data).toLocaleDateString('pt-BR')}</p><p>Itens: ${p.itens.map(x=>x.qtd+'x '+x.nome.replace(/'/g,"\\'")).join(', ')}</p><p style="margin-top:6px">Status: <select class="ss" onchange="uS(${i},this.value)"><option ${p.status==='Em preparação'?'selected':''}>Em preparação</option><option ${p.status==='Em rota de envio'?'selected':''}>Em rota de envio</option><option ${p.status==='Entregue'?'selected':''}>Entregue</option></select></p></div>`).join('');};window.uS=(i,v)=>{let ps=JSON.parse(localStorage.getItem('pedidosFaux')||'[]');ps[i].status=v;localStorage.setItem('pedidosFaux',JSON.stringify(ps));showAlert('Status atualizado!');};document.querySelectorAll('.tb button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tb button').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.getElementById('tP').classList.remove('on');document.getElementById('tU').classList.remove('on');document.getElementById('tO').classList.remove('on');document.getElementById('t'+b.dataset.t.toUpperCase()).classList.add('on');});function uN(){let e=localStorage.getItem('userEmailFaux'),r=localStorage.getItem('userRoleFaux'),lb=document.getElementById('lg'),pb=document.getElementById('pf');if(e){lb.style.display='none';pb.style.display='inline-block';pb.onclick=()=>location.href=r==='admin'?'admin.html':'perfil.html';}else{lb.style.display='inline-block';lb.onclick=()=>document.getElementById('md').style.display='flex';pb.style.display='none';}}carregarProdutos();rP();rU();rO();uN();document.getElementById('lo').onclick=()=>{showConfirm('Sair do painel administrativo?',()=>{localStorage.removeItem('userEmailFaux');localStorage.removeItem('userRoleFaux');location.href='index.html';});};let md=document.getElementById('md'),cs=md.querySelector('.cl'),tbs=md.querySelectorAll('.tb2 button'),pL=document.getElementById('pL'),pR=document.getElementById('pR');tbs.forEach(b=>b.onclick=()=>{tbs.forEach(x=>x.classList.remove('on'));b.classList.add('on');pL.classList.remove('on');pR.classList.remove('on');(b.dataset.t==='l'?pL:pR).classList.add('on');});cs.onclick=()=>md.style.display='none';md.onclick=e=>{if(e.target===md)md.style.display='none';};function su(em,ro){localStorage.setItem('userEmailFaux',em);localStorage.setItem('userRoleFaux',ro);md.style.display='none';uN();showAlert(ro==='admin'?'Login como administrador realizado com sucesso!':'Login realizado com sucesso!');}document.getElementById('mL').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;if(em&&s){let u=JSON.parse(localStorage.getItem('usersFaux')||'[]').find(u=>u.email===em&&u.senha===s);u?su(em,'user'):showAlert('Email/senha inválidos!');}else showAlert('Preencha todos os campos!');};document.getElementById('mA').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;em==='admin@faux.com'&&s==='123456'?su(em,'admin'):showAlert('Admin inválido!');};document.getElementById('mR').onclick=()=>{let n=document.getElementById('rN').value.trim(),em=document.getElementById('rE').value.trim(),s=document.getElementById('rS').value,c=document.getElementById('rC').value;if(!n||!em||!s||!c)return showAlert('Preencha todos os campos!');if(s!==c)return showAlert('Senhas não conferem!');let us=JSON.parse(localStorage.getItem('usersFaux')||'[]');if(us.find(u=>u.email===em))return showAlert('Email já cadastrado!');us.push({nome:n,email:em,senha:s});localStorage.setItem('usersFaux',JSON.stringify(us));tbs[0].click();document.getElementById('lE').value=em;document.getElementById('lS').value=s;showAlert('Conta criada com sucesso!');document.getElementById('mL').click();};document.getElementById('fe').onclick=e=>{e.preventDefault();let fM=document.getElementById('fM'),fMi=document.getElementById('fMi'),fMp=document.getElementById('fMp'),fMb=document.getElementById('fMb');fM.style.display='flex';fMi.style.display='block';fMp.textContent='Digite seu e-mail para recuperar a senha:';fMb.textContent='Recuperar';fMb.onclick=()=>{let em=fMi.value.trim();if(!em)return showAlert('Digite um e-mail!');let us=JSON.parse(localStorage.getItem('usersFaux')||'[]'),u=us.find(u=>u.email===em);if(u){showAlert('Senha: '+u.senha);fM.style.display='none';fMi.value='';}else{showAlert('E-mail não encontrado!');}};};let am=document.getElementById('am'),amp=document.getElementById('amp'),amb=document.getElementById('amb'),amc=document.getElementById('amc'),amin=document.getElementById('amin'),ami=document.getElementById('ami');window.showAlert=(msg,cb)=>{am.style.display='flex';amp.textContent=msg;amin.style.display='none';amb.style.display='inline-block';amc.style.display='none';amb.onclick=()=>{am.style.display='none';if(cb)cb();};};window.showConfirm=(msg,cb)=>{am.style.display='flex';amp.textContent=msg;amin.style.display='none';amb.style.display='inline-block';amc.style.display='inline-block';amb.textContent='Sim';amc.textContent='Não';amb.onclick=()=>{am.style.display='none';if(cb)cb();};amc.onclick=()=>{am.style.display='none';};};document.getElementById('fMc').onclick=()=>{document.getElementById('fM').style.display='none';};document.getElementById('fM').onclick=e=>{if(e.target===document.getElementById('fM'))document.getElementById('fM').style.display='none';};am.onclick=e=>{if(e.target===am)am.style.display='none';};const pdm=document.getElementById('pdm'),pdmClose=document.getElementById('pdmClose'),pdSalvar=document.getElementById('pdSalvar'),pdCancelar=document.getElementById('pdCancelar');function limparCamposProduto(){document.getElementById('pdNome').value='';document.getElementById('pdPreco').value='';document.getElementById('pdDesc').value='';document.getElementById('pdImg').value='roupa1.jpg';document.getElementById('pdEstoque').value='';document.getElementById('pdTipo').value='';}document.getElementById('aP').onclick=()=>{limparCamposProduto();pdm.style.display='flex';};pdmClose.onclick=()=>pdm.style.display='none';pdm.onclick=e=>{if(e.target===pdm)pdm.style.display='none';};pdCancelar.onclick=()=>pdm.style.display='none';pdSalvar.onclick=()=>{let nome=document.getElementById('pdNome').value.trim();if(!nome){showAlert('Nome obrigatório!');return;}let preco=parseFloat(document.getElementById('pdPreco').value);if(isNaN(preco)||preco<=0){showAlert('Preço inválido!');return;}let desc=document.getElementById('pdDesc').value.trim()||'Nova roupa';let imgNome=document.getElementById('pdImg').value.trim();if(!imgNome)imgNome='roupa1.jpg';imgNome='imagens/'+imgNome;let estoque=parseInt(document.getElementById('pdEstoque').value);if(isNaN(estoque)||estoque<0)estoque=0;let tipo=document.getElementById('pdTipo').value.trim()||'Outro';if(P[nome]){showConfirm('Produto já existe. Deseja substituir?',()=>{P[nome]={total:estoque,desc:desc,preco:preco,img:imgNome,tipo:tipo};salvarProdutos();rP();showAlert('Produto "'+nome+'" atualizado!');pdm.style.display='none';});}else{P[nome]={total:estoque,desc:desc,preco:preco,img:imgNome,tipo:tipo};salvarProdutos();rP();showAlert('Produto "'+nome+'" adicionado com sucesso!');pdm.style.display='none';}};})();</script></body></html>
