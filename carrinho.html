<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>FAUX GHOST · Carrinho</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent}body{background:#fff;color:#000;min-height:100vh;display:flex;flex-direction:column;font-size:1rem}nav{background:#000;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #fff;position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px}.logo{font-size:1.5rem;font-weight:800;color:#fff;text-decoration:none;letter-spacing:-0.5px}.nl{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.nl a,.nl button{color:#ccc;text-decoration:none;font-weight:600;background:none;border:none;font-size:0.9rem;cursor:pointer;padding:4px 0}.bp{background:#fff!important;color:#000!important;padding:4px 10px!important}.cr{padding:12px;flex:1}.tt{font-size:1.6rem;margin:6px 0 12px;color:#000;border-left:4px solid #000;padding-left:8px}.vz{text-align:center;padding:30px;background:#fff;border:2px solid #000}.vz a{color:#000;font-weight:800;text-decoration:none}.ci{background:#fff;border:2px solid #000;margin-bottom:10px;padding:10px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}.ci img{width:70px;height:70px;object-fit:cover;border:1px solid #000}.ii{flex:2;min-width:120px}.in{font-size:1rem;font-weight:800;color:#000}.it{color:#555;font-size:0.8rem}.ip{font-size:1rem;font-weight:800;margin-top:4px;color:#000}.iq{display:flex;align-items:center;gap:6px}.iq button{background:#000;color:#fff;width:32px;height:32px;font-weight:800;font-size:1rem;cursor:pointer;border:1px solid #000}.iq span{min-width:32px;text-align:center;font-weight:700;color:#000}.ir{background:#fff;color:#000;border:1px solid #000;padding:6px 12px;font-weight:700;cursor:pointer;font-size:0.8rem}.rs{background:#fff;border:2px solid #000;padding:16px;margin-top:20px}.rs p{display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.9rem;color:#000}.rs .tl{font-size:1.2rem;font-weight:800;margin-top:10px;padding-top:10px;border-top:2px solid #000}.bf{background:#000;color:#fff;border:2px solid #000;padding:12px;width:100%;font-weight:800;font-size:0.9rem;cursor:pointer;margin-top:14px}footer{background:#000;color:#ccc;padding:12px;text-align:center;border-top:2px solid #fff;margin-top:auto;font-size:0.8rem}footer a{color:#fff;margin:0 4px;text-decoration:none}.md{z-index:1000;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:none;justify-content:center;align-items:center;padding:12px}.mc{background:#fff;border:2px solid #000;width:100%;max-width:320px;padding:14px}.mc h3{color:#000;margin-bottom:10px;font-size:1.5rem}.mc input{width:100%;padding:8px;margin-bottom:8px;background:#fff;border:2px solid #000;font-size:0.9rem}.mc button{background:#000;color:#fff;border:none;padding:8px;width:100%;margin-top:4px;font-weight:700;cursor:pointer;font-size:0.9rem}.cl{float:right;font-size:1.6rem;color:#000;cursor:pointer}.tb{display:flex;gap:8px;margin-bottom:10px}.tb button{background:none;border:none;padding:6px 10px;font-weight:700;color:#000;font-size:0.9rem;cursor:pointer}.tb button.on{background:#000;color:#fff}.tp{display:none}.tp.on{display:block}@media(min-width:600px){.ci{flex-wrap:nowrap}.ci img{width:90px;height:90px}}.pm{z-index:2000;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:none;justify-content:center;align-items:center;padding:12px}.pmc{background:#fff;border:2px solid #000;width:100%;max-width:300px;padding:14px;text-align:center}.pmc p{margin-bottom:12px;color:#000;font-size:0.9rem}.pmc button{background:#000;color:#fff;border:none;padding:8px 16px;font-weight:700;cursor:pointer;font-size:0.9rem;margin:0 4px}</style></head><body><nav><a href="index.html" class="logo">FAUX GHOST</a><div class="nl"><a href="index.html">Home</a><a href="produtos.html">Roupas</a><a href="carrinho.html">Carrinho</a><a href="#" id="pf" class="bp" style="display:none">Perfil</a><button id="lg">Entrar</button></div></nav><section class="cr"><h1 class="tt">Meu Carrinho</h1><div id="lC"></div><div id="rsC"></div></section><footer><p>FAUX GHOST © 2025</p><p><a href="contato.html">Sobre</a> | <a href="contato.html">Entregas</a> | <a href="contato.html">Trocas</a> | <a href="contato.html">Contato</a></p></footer><div id="md" class="md"><div class="mc"><span class="cl">&times;</span><h3>Acessar</h3><div class="tb"><button class="on" data-t="l">Login</button><button data-t="r">Registro</button></div><div id="pL" class="tp on"><input id="lE" placeholder="Email"><input id="lS" type="password" placeholder="Senha"><button id="mL">Entrar</button><button id="mA" style="background:#fff;color:#000;border:2px solid #000">Admin</button><a href="#" id="fe" style="display:block;text-align:center;margin-top:6px;color:#000;font-size:0.8rem">Esqueceu a senha?</a></div><div id="pR" class="tp"><input id="rN" placeholder="Nome"><input id="rE" placeholder="Email"><input id="rS" type="password" placeholder="Senha"><input id="rC" type="password" placeholder="Confirmar"><button id="mR">Criar Conta</button></div><div style="margin-top:8px;text-align:center;font-size:0.75rem;color:#000">admin@faux.com / 123456</div></div></div><div id="fM" class="pm"><div class="pmc"><p id="fMp"></p><input id="fMi" placeholder="Digite seu e-mail" style="width:100%;padding:8px;margin-bottom:8px;border:2px solid #000;font-size:0.9rem;display:none"><button id="fMb"></button><button id="fMc" style="background:#fff;color:#000;border:2px solid #000">Fechar</button></div></div><div id="am" class="pm"><div class="pmc"><p id="amp"></p><div id="amin" style="display:none"><input id="ami" placeholder="" style="width:100%;padding:8px;margin-bottom:8px;border:2px solid #000;font-size:0.9rem"></div><button id="amb">OK</button><button id="amc" style="background:#fff;color:#000;border:2px solid #000;display:none">Cancelar</button></div></div><script>(function(){let P={};const ldP=()=>{let s=localStorage.getItem('produtosEstoqueFaux');if(s)P=JSON.parse(s);else{P={};localStorage.setItem('produtosEstoqueFaux',JSON.stringify(P));}};const rC=()=>{let c=JSON.parse(localStorage.getItem('carrinhoFaux')||'[]'),lD=document.getElementById('lC'),rD=document.getElementById('rsC');if(!c.length){lD.innerHTML='<div class="vz"><p>Seu carrinho está vazio</p><p style="margin-top:10px"><a href="produtos.html">Ver roupas →</a></p></div>';rD.innerHTML='';return;}lD.innerHTML=c.map((it,i)=>`<div class="ci"><img src="${it.img}" alt=""><div class="ii"><div class="in">${it.nome.replace(/'/g,"\\'")}</div><div class="it">Tamanho: ${it.tamanho||'Único'}</div><div class="ip">R$ ${it.preco.toFixed(2)}</div></div><div class="iq"><button data-a="m" data-i="${i}">−</button><span>${it.qtd}</span><button data-a="p" data-i="${i}">+</button></div><button class="ir" data-i="${i}">Remover</button></div>`).join('');lD.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{let i=+b.dataset.i;if(b.dataset.a==='m'){if(c[i].qtd>1)c[i].qtd--;else c.splice(i,1);}else{let nm=c[i].nome.split(' (')[0],sk=P[nm]?.total||0;if(c[i].qtd<sk)c[i].qtd++;else showAlert('Estoque insuficiente: '+sk+' unidades');}localStorage.setItem('carrinhoFaux',JSON.stringify(c));rC();});lD.querySelectorAll('.ir').forEach(b=>b.onclick=()=>{c.splice(+b.dataset.i,1);localStorage.setItem('carrinhoFaux',JSON.stringify(c));rC();});let st=c.reduce((s,it)=>s+it.preco*it.qtd,0);rD.innerHTML=`<div class="rs"><p><span>Subtotal (${c.reduce((s,it)=>s+it.qtd,0)} itens):</span><span>R$ ${st.toFixed(2)}</span></p><p><span>Frete:</span><span>Calculado no checkout</span></p><p class="tl"><span>Total:</span><span>R$ ${st.toFixed(2)}</span></p><button class="bf" id="fB">Finalizar Compra →</button></div>`;document.getElementById('fB').onclick=()=>{if(!c.length){showAlert('Carrinho vazio');return;}if(!localStorage.getItem('userEmailFaux')){showAlert('Faça login para continuar');document.getElementById('md').style.display='flex';return;}location.href='checkout.html';};};function uN(){let e=localStorage.getItem('userEmailFaux'),r=localStorage.getItem('userRoleFaux'),lb=document.getElementById('lg'),pb=document.getElementById('pf');if(e){lb.style.display='none';pb.style.display='inline-block';pb.onclick=()=>location.href=r==='admin'?'admin.html':'perfil.html';}else{lb.style.display='inline-block';lb.onclick=()=>document.getElementById('md').style.display='flex';pb.style.display='none';}}ldP();rC();uN();let md=document.getElementById('md'),cs=md.querySelector('.cl'),tbs=md.querySelectorAll('.tb button'),pL=document.getElementById('pL'),pR=document.getElementById('pR');tbs.forEach(b=>b.onclick=()=>{tbs.forEach(x=>x.classList.remove('on'));b.classList.add('on');pL.classList.remove('on');pR.classList.remove('on');(b.dataset.t==='l'?pL:pR).classList.add('on');});cs.onclick=()=>md.style.display='none';md.onclick=e=>{if(e.target===md)md.style.display='none';};function su(em,ro){localStorage.setItem('userEmailFaux',em);localStorage.setItem('userRoleFaux',ro);md.style.display='none';uN();showAlert(ro==='admin'?'Login como administrador realizado com sucesso!':'Login realizado com sucesso!');}document.getElementById('mL').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;if(em&&s){let u=JSON.parse(localStorage.getItem('usersFaux')||'[]').find(u=>u.email===em&&u.senha===s);u?su(em,'user'):showAlert('Email/senha inválidos!');}else showAlert('Preencha todos os campos!');};document.getElementById('mA').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;em==='admin@faux.com'&&s==='123456'?su(em,'admin'):showAlert('Admin inválido!');};document.getElementById('mR').onclick=()=>{let n=document.getElementById('rN').value.trim(),em=document.getElementById('rE').value.trim(),s=document.getElementById('rS').value,c=document.getElementById('rC').value;if(!n||!em||!s||!c)return showAlert('Preencha todos os campos!');if(s!==c)return showAlert('Senhas não conferem!');let us=JSON.parse(localStorage.getItem('usersFaux')||'[]');if(us.find(u=>u.email===em))return showAlert('Email já cadastrado!');us.push({nome:n,email:em,senha:s});localStorage.setItem('usersFaux',JSON.stringify(us));tbs[0].click();document.getElementById('lE').value=em;document.getElementById('lS').value=s;showAlert('Conta criada com sucesso!');document.getElementById('mL').click();};document.getElementById('fe').onclick=e=>{e.preventDefault();let fM=document.getElementById('fM'),fMi=document.getElementById('fMi'),fMp=document.getElementById('fMp'),fMb=document.getElementById('fMb');fM.style.display='flex';fMi.style.display='block';fMp.textContent='Digite seu e-mail para recuperar a senha:';fMb.textContent='Recuperar';fMb.onclick=()=>{let em=fMi.value.trim();if(!em)return showAlert('Digite um e-mail!');let us=JSON.parse(localStorage.getItem('usersFaux')||'[]'),u=us.find(u=>u.email===em);if(u){showAlert('Sua senha: '+u.senha);fM.style.display='none';fMi.value='';}else{showAlert('E-mail não encontrado!');}};};let am=document.getElementById('am'),amp=document.getElementById('amp'),amb=document.getElementById('amb'),amc=document.getElementById('amc'),amin=document.getElementById('amin'),ami=document.getElementById('ami');window.showAlert=(msg,cb)=>{am.style.display='flex';amp.textContent=msg;amin.style.display='none';amb.style.display='inline-block';amc.style.display='none';amb.onclick=()=>{am.style.display='none';if(cb)cb();};};window.showConfirm=(msg,cb)=>{am.style.display='flex';amp.textContent=msg;amin.style.display='none';amb.style.display='inline-block';amc.style.display='inline-block';amb.textContent='Sim';amc.textContent='Não';amb.onclick=()=>{am.style.display='none';if(cb)cb();};amc.onclick=()=>{am.style.display='none';};};document.getElementById('fMc').onclick=()=>{document.getElementById('fM').style.display='none';};document.getElementById('fM').onclick=e=>{if(e.target===document.getElementById('fM'))document.getElementById('fM').style.display='none';};am.onclick=e=>{if(e.target===am)am.style.display='none';};})();</script></body></html>
