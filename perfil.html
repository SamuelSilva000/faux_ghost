m"><div class="pmc"><p id="amp"></p><div id="amin" style="display:none"><input id="ami" placeholder="" style="width:100%;padding:8px;margin-bottom:8px;border:2px solid #000;font-size:0.9rem"></div><button id="amb">OK</button><button id="amc" style="background:#fff;color:#000;border:2px solid #000;display:none">Cancelar</button></div></div><script>(function(){if(!localStorage.getItem('userEmailFaux')){location.href='index.html';}if(localStorage.getItem('userRoleFaux')==='admin'){location.href='admin.html';}const ldD=()=>{let e=localStorage.getItem('userEmailFaux'),u=JSON.parse(localStorage.getItem('usersFaux')||'[]').find(x=>x.email===e);if(u)document.getElementById('eN').value=u.nome;document.getElementById('eE').value=e;};const ldP=()=>{let e=localStorage.getItem('userEmailFaux'),p=JSON.parse(localStorage.getItem('pedidosFaux')||'[]').filter(x=>x.userEmail===e),d=document.getElementById('pLd');if(!p.length){d.innerHTML='<div class="vz">Nenhum pedido ainda</div>';return;}d.innerHTML=p.map((x,i)=>{let s=x.status==='Em preparação'?'ep':x.status==='Em rota de envio'?'ev':'er',it=x.itens.map(t=>t.qtd+'x '+t.nome).join(', '),en=(x.endereco||'—');return`<div class="pi"><strong>Pedido #${i+1}</strong><p>Total: R$ ${x.total.toFixed(2)}${x.frete?' + frete R$ '+x.frete.toFixed(2):''}</p><p>Endereço: ${en}</p><p>Data: ${new Date(x.data).toLocaleDateString('pt-BR')}</p><p class="st ${s}">Status: ${x.status}</p><p>Itens: ${it}</p>${x.status!=='Entregue'?`<button class="bc" onclick="cP(${i})">Cancelar Pedido</button>`:''}</div>`;}).join('');};window.cP=i=>{let p=JSON.parse(localStorage.getItem('pedidosFaux')||'[]');if(p[i].status==='Entregue'){showAlert('Pedido entregue não pode ser cancelado');return;}showConfirm('Cancelar pedido?',()=>{p.splice(i,1);localStorage.setItem('pedidosFaux',JSON.stringify(p));showAlert('Cancelado!');ldP();});};document.getElementById('sB').onclick=()=>{let n=document.getElementById('eN').value.trim(),s=document.getElementById('eS').value,e=localStorage.getItem('userEmailFaux');if(!n){showAlert('Nome obrigatório');return;}let u=JSON.parse(localStorage.getItem('usersFaux')||'[]'),idx=u.findIndex(x=>x.email===e);if(idx!==-1){u[idx].nome=n;if(s)u[idx].senha=s;localStorage.setItem('usersFaux',JSON.stringify(u));showAlert('Dados salvos!');}};document.getElementById('lO').onclick=()=>{showConfirm('Sair da conta?',()=>{localStorage.removeItem('userEmailFaux');localStorage.removeItem('userRoleFaux');location.href='index.html';});};function uN(){let e=localStorage.getItem('userEmailFaux'),r=localStorage.getItem('userRoleFaux'),lb=document.getElementById('lg'),pb=document.getElementById('pf');if(e){lb.style.display='none';pb.style.display='inline-block';pb.onclick=()=>location.href=r==='admin'?'admin.html':'perfil.html';}else{lb.style.display='inline-block';lb.onclick=()=>document.getElementById('md').style.display='flex';pb.style.display='none';}}ldD();ldP();uN();let md=document.getElementById('md'),cs=md.querySelector('.cl'),tbs=md.querySelectorAll('.tb button'),pL=document.getElementById('pL'),pR=document.getElementById('pR');tbs.forEach(b=>b.onclick=()=>{tbs.forEach(x=>x.classList.remove('on'));b.classList.add('on');pL.classList.remove('on');pR.classList.remove('on');(b.dataset.t==='l'?pL:pR).classList.add('on');});cs.onclick=()=>md.style.display='none';md.onclick=e=>{if(e.target===md)md.style.display='none';};function su(em,ro){localStorage.setItem('userEmailFaux',em);localStorage.setItem('userRoleFaux',ro);md.style.display='none';uN();showAlert(ro==='admin'?'Login como administrador realizado com sucesso!':'Login realizado com sucesso!');}document.getElementById('mL').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;if(em&&s){let u=JSON.parse(localStorage.getItem('usersFaux')||'[]').find(u=>u.email===em&&u.senha===s);u?su(em,'user'):showAlert('Email/senha inválidos!');}else showAlert('Preencha todos os campos!');};document.getElementById('mA').onclick=()=>{let em=do
